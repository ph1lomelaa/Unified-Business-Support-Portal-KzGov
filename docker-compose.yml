services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eppb}
      POSTGRES_USER: ${POSTGRES_USER:-eppb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eppb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eppb} -d ${POSTGRES_DB:-eppb}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-eppb}:${POSTGRES_PASSWORD:-eppb}@postgres:5432/${POSTGRES_DB:-eppb}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3007}
      SESSION_SECRET: ${SESSION_SECRET:-eppb-docker-demo-secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      DATA_EGOV_API_KEY: ${DATA_EGOV_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_ORIGIN: http://backend:8000
    environment:
      BACKEND_ORIGIN: http://backend:8000
    container_name: eppb-frontend
    depends_on:
      - backend
    ports:
      - "3007:3007"
    command: npm start -- -p 3007

volumes:
  postgres-data:
  backend-storage:
